<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagination Component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="pagination-component">
      <div class="left-btn">
        <button class="btn btn--left">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="btn-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 19.5 8.25 12l7.5-7.5"
            />
          </svg>
        </button>
      </div>

      <div>
        <ul class="numbers">
          <li><a href="#" class="number">1</a></li>
          <li><a href="#" class="number">2</a></li>
          <li><a href="#" class="number active">3</a></li>
          <li><a href="#" class="number">4</a></li>
          <li><a href="#" class="number">5</a></li>
          <li><a href="#" class="number">6</a></li>
          <span class="dots">...</span>
          <li><a href="#" class="number">23</a></li>
        </ul>
      </div>
      <div class="right-btn">
        <button class="btn btn--right">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="btn-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m8.25 4.5 7.5 7.5-7.5 7.5"
            />
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>
